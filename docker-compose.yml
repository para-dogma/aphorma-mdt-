version: '3.8'

services:
  api:
    build: .
    container_name: aphorma-mdt-api
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgresql://mdt:mdt@db:5432/aphorma_mdt
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=change-me-in-production
      - APP_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aphorma-net

  db:
    image: postgres:16-alpine
    container_name: aphorma-mdt-db
    environment:
      - POSTGRES_USER=mdt
      - POSTGRES_PASSWORD=mdt
      - POSTGRES_DB=aphorma_mdt
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mdt']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aphorma-net

  redis:
    image: redis:7-alpine
    container_name: aphorma-mdt-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aphorma-net

  prometheus:
    image: prom/prometheus:latest
    container_name: aphorma-mdt-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    restart: unless-stopped
    networks:
      - aphorma-net

  grafana:
    image: grafana/grafana:latest
    container_name: aphorma-mdt-grafana
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafanadata:/var/lib/grafana
    restart: unless-stopped
    networks:
      - aphorma-net

volumes:
  pgdata:
  redisdata:
  promdata:
  grafanadata:

networks:
  aphorma-net:
    driver: bridge

version: '3.8'
services:
  aphorma-mdt:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/aphorma_mdt.db
      - REDIS_URL=redis://redis:6379/0
      - CONSENSUS_WINDOW_SECONDS=30
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
